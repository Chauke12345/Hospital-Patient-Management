<h1>Doctor Dashboard</h1>

<h3>Your Appointments</h3>

<ul>
    {% for a in appointments %}
        <li>
            Patient: {{ a.patient }} |
            Date: {{ a.appointment_date }} |
            Status: {{ a.status }}

            <a href="/doctor/appointment/{{ a.id }}/">View</a>
        </li>
    {% empty %}
        <li>No appointments assigned</li>
    {% endfor %}
</ul>
